# 2-shard / 1-replica-per-shard ClickHouse cluster + a single-node
# clickhouse-keeper, for the issue #5 "2-shard cluster variant" CI leg
# (docs/schemas.md §7 — `_dist` writes/reads, live sharding-identity
# assertions). Runtime-neutral: works with either `docker compose` or
# `podman-compose` (podman's CLI is docker-compatible), matching the
# existing `xtask/docker/docker-compose.ch.yml` convention. CI uses the
# runner's docker; local runs use podman.
#
# Bring up:
#   podman-compose -f ci/clickhouse-cluster/compose.yaml up -d
#   # or: docker compose -f ci/clickhouse-cluster/compose.yaml up -d
#
# Tear down:
#   podman-compose -f ci/clickhouse-cluster/compose.yaml down -v
version: "3.8"

# Fixed, user-defined subnet with a static `ipv4_address` per container
# (KISS directive on issue #5): every config file here — `remote_servers`,
# Keeper's `<zookeeper>` block, `interserver_http_host` — addresses the
# other nodes purely by these IPs. No DNS aliases, no service-name
# resolution, anywhere in the fixture.
networks:
  pulsus-schema-it:
    name: pulsus-schema-it-cluster
    ipam:
      config:
        - subnet: 172.28.0.0/24

services:
  keeper:
    image: docker.io/clickhouse/clickhouse-keeper:24.8
    container_name: pulsus-keeper-it
    networks:
      pulsus-schema-it:
        ipv4_address: 172.28.0.10
    volumes:
      - ./keeper/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    ports:
      - "19181:9181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 nc -w 2 127.0.0.1 9181 | grep -q imok"]
      interval: 2s
      timeout: 3s
      retries: 30

  ch-shard1:
    image: docker.io/clickhouse/clickhouse-server:24.8
    container_name: pulsus-ch-shard1-it
    networks:
      pulsus-schema-it:
        ipv4_address: 172.28.0.11
    depends_on:
      - keeper
    volumes:
      - ./config.d/zookeeper.xml:/etc/clickhouse-server/config.d/zookeeper.xml:ro
      - ./config.d/remote_servers.xml:/etc/clickhouse-server/config.d/remote_servers.xml:ro
      - ./users.d/network.xml:/etc/clickhouse-server/users.d/network.xml:ro
      - ./shard1/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
    ports:
      - "18123:8123" # HTTP
      - "19000:9000" # native
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  ch-shard2:
    image: docker.io/clickhouse/clickhouse-server:24.8
    container_name: pulsus-ch-shard2-it
    networks:
      pulsus-schema-it:
        ipv4_address: 172.28.0.12
    depends_on:
      - keeper
    volumes:
      - ./config.d/zookeeper.xml:/etc/clickhouse-server/config.d/zookeeper.xml:ro
      - ./config.d/remote_servers.xml:/etc/clickhouse-server/config.d/remote_servers.xml:ro
      - ./users.d/network.xml:/etc/clickhouse-server/users.d/network.xml:ro
      - ./shard2/macros.xml:/etc/clickhouse-server/config.d/macros.xml:ro
    ports:
      - "28123:8123" # HTTP
      - "29000:9000" # native
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
