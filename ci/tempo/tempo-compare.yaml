# Single-binary Tempo v3.0.2 config used as the black-box oracle for BOTH
# TraceQL differential legs (issue #185, M7-TQ6):
#
#   1. the syntax differential (tempo_differential.rs) — sends TraceQL query
#      strings and observes only the HTTP status (2xx accept / 400 reject);
#   2. the compare() VALUE differential (compare_value_differential.rs) —
#      pushes OTLP spans over the HTTP receiver, then queries the metrics
#      API's compare() and asserts byte-parity on statusMessage / rootName /
#      rootServiceName against PulsusDB.
#
# It stores nothing meaningful and serves no production role — pure runtime
# use of the unmodified upstream image. No Tempo source is copied.
#
# --- Tempo v3.0.2 architecture note ---------------------------------------
# v3.0 reworked the write path. There is NO top-level `ingester` block and NO
# `local_blocks` metrics-generator processor (both were rejected by 3.0.2's
# strict parser). Recent-trace buffering AND TraceQL-metrics/compare() over
# recent spans are now both served by the new `live_store` component — it
# holds live traces, cuts local WAL/blocks, and answers metrics queries over
# those recent blocks directly (query_block_concurrency / live_store.metrics).
# So the old `metrics_generator.processor.local_blocks` + per-tenant
# `processors: [local-blocks]` override is gone; nothing replaces it — metrics
# queries over local data are automatic via live_store.
#
# Ingest is tuned aggressively (max_trace_idle 1s + max_block_duration 2s +
# flush_check_period 1s) so a freshly-pushed span is cut into a queryable
# live-store block within a few seconds; complete_block_timeout 30m then keeps
# that completed block queryable for the whole test window.
#
# NOTE on visibility latency: Tempo only finalises a TraceQL-metrics time
# bucket once wall-clock passes that bucket's right edge, and it buckets spans
# by their span time. The compare() leg therefore anchors its corpus ~90 s in
# the PAST and queries a window that ends in the past too (base-60s .. base+60s
# with a small fixed step), so every bucket the query touches is ALREADY
# finalised. compare() counts then appear COMPLETE within a few seconds of the
# push flushing (observed ~2-3 s locally) — no waiting on a future boundary.
# (An earlier design used a forward window ending ~120 s in the FUTURE; that
# forced the bucket to finalise as wall-clock advanced, ~70-190 s later, which
# raced the poll budget and intermittently red-ed main. Fixed in the test, not
# via these flush knobs.)
# --------------------------------------------------------------------------

# Required for TraceQL streaming/metrics responses over plain HTTP.
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

# The OTLP HTTP receiver the compare() leg pushes fixture spans to.
distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

# v3.0.2 replacement for the old top-level `ingester` fast-flush knobs. The
# live-store buffers recent traces, cuts local blocks, and serves TraceQL
# metrics/compare() over them.
live_store:
  max_trace_idle: 1s
  max_block_duration: 2s
  flush_check_period: 1s
  complete_block_timeout: 30m
  # Single-binary, no Kafka: there is no consumer lag to catch up on, so don't
  # gate /ready on a lag target and don't fail queries on lag.
  readiness_target_lag: 0s
  fail_on_high_lag: false

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# Allow unbounded TraceQL-metrics query windows so the wide compare() test
# window is not range-rejected. The default `query_backend_after` (15m) is
# left in place on purpose: in v3.0.2 metrics ranges newer than that boundary
# are served from the live-store (where our freshly-pushed spans live), while
# older ranges hit the object-storage backend. The compare() corpus is always
# within a few minutes of "now", so it is served entirely by the live-store.
query_frontend:
  metrics:
    max_duration: 0s

usage_report:
  reporting_enabled: false
