# Local ClickHouse 24.8 (docs/schemas.md §8 minimum-supported version) for the
# xtask ch-bench harness. Works with either `docker compose` or
# `podman-compose` (podman's CLI is docker-compatible). To run the plain
# scenarios only, a bare container is simpler:
#
#   podman run -d --rm --name pulsus-ch-bench \
#       -p 9000:9000 -p 8123:8123 clickhouse/clickhouse-server:24.8
#
# For the `tls` scenario, first run `./gen-certs.sh` (writes ./certs/), then
# bring up the `clickhouse-tls` service below, which mounts the certs and
# config.d/tls.xml to expose secure native (9440) and HTTPS (8443) ports.
version: "3.8"

services:
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:24.8
    container_name: pulsus-ch-bench
    ports:
      - "9000:9000" # native protocol (klickhouse)
      - "8123:8123" # HTTP interface (clickhouse)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  clickhouse-tls:
    image: docker.io/clickhouse/clickhouse-server:24.8
    container_name: pulsus-ch-bench-tls
    profiles: ["tls"]
    ports:
      - "9440:9440" # native protocol over TLS
      - "8443:8443" # HTTPS interface
    volumes:
      - ./certs:/certs:ro
      - ./config.d/tls.xml:/etc/clickhouse-server/config.d/tls.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--spider", "-q", "https://localhost:8443/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
