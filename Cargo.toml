[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
edition = "2024"
license = "AGPL-3.0-only"
rust-version = "1.93"
repository = "https://github.com/digitalis-io/pulsusdb"
authors = ["PulsusDB contributors"]

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_norway = "0.9"
thiserror = "2"
