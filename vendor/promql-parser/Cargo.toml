# PulsusDB vendoring note (docs/decisions/0003): this file lives under the
# root PulsusDB workspace's directory tree but is deliberately NOT a
# workspace member (not listed in the root Cargo.toml's `members`) — it is
# consumed exclusively via the root `[patch.crates-io]` entry, so
# `cargo test --workspace`/`cargo check --workspace` at the repo root never
# touches this crate's own `#[cfg(test)]` modules. The empty `[workspace]`
# table below only stops Cargo's workspace auto-detection from treating
# this directory as an orphaned member of the root workspace (a Cargo
# requirement for any nested manifest); it does not add this crate as a
# workspace member. To run this crate's own test suite standalone (e.g.
# after re-vendoring), use `cargo test --manifest-path
# vendor/promql-parser/Cargo.toml`.
[workspace]

[package]
name = "promql-parser"
readme = "README.md"
description = "Parse PromQL query into AST"
repository = "https://github.com/GreptimeTeam/promql-parser"
version = "0.10.0"
edition = "2021"
authors = ["The GreptimeDB Project Developers"]
keywords = ["prometheus", "promql", "parser"]
license = "Apache-2.0"
categories = ["parser-implementations"]

[dependencies]
cfgrammar = "0.13.5"
chrono = "0.4.38"
lazy_static = "1.4.0"
lrlex = "0.13.5"
lrpar = "0.13.5"
regex = "1"
serde = { version = "1", optional = true }
serde_json = { version = "1", optional = true }

[features]
default = []
ser = ["serde", "serde_json"]

[build-dependencies]
cfgrammar = "0.13.5"
lrlex = "0.13.5"
lrpar = "0.13.5"
