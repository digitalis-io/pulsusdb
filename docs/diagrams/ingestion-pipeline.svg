<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="300" viewBox="0 0 1120 300" role="img" aria-labelledby="title desc">
  <title id="title">Writer ingestion pipeline</title>
  <desc id="desc">Requests are decompressed, parsed, normalized, appended to columnar buffers, flushed by size or age, and inserted into ClickHouse as columnar batches.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 1.6; }
      .box2 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.6; }
      .box3 { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; }
      .title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="300"/>
  <text class="title" x="40" y="42">Writer ingestion pipeline</text>

  <rect class="box" x="40" y="82" width="130" height="86" rx="8"/>
  <text class="label" x="64" y="112">HTTP</text>
  <text class="small" x="64" y="136">request</text>

  <rect class="box" x="210" y="82" width="140" height="86" rx="8"/>
  <text class="label" x="236" y="112">decompress</text>
  <text class="small" x="232" y="136">gzip, snappy, zstd</text>

  <rect class="box" x="390" y="82" width="150" height="86" rx="8"/>
  <text class="label" x="420" y="112">parse</text>
  <text class="small" x="414" y="136">route + content type</text>

  <rect class="box2" x="580" y="82" width="150" height="86" rx="8"/>
  <text class="label" x="606" y="112">normalize</text>
  <text class="small" x="602" y="136">labels, fingerprints, rows</text>

  <rect class="box2" x="770" y="82" width="150" height="86" rx="8"/>
  <text class="label" x="796" y="112">buffer</text>
  <text class="small" x="793" y="136">per-table columns</text>

  <rect class="box3" x="960" y="82" width="130" height="86" rx="8"/>
  <text class="label" x="992" y="112">insert</text>
  <text class="small" x="982" y="136">columnar batch</text>

  <path class="arrow" d="M 170 125 H 208"/>
  <path class="arrow" d="M 350 125 H 388"/>
  <path class="arrow" d="M 540 125 H 578"/>
  <path class="arrow" d="M 730 125 H 768"/>
  <path class="arrow" d="M 920 125 H 958"/>

  <rect class="box3" x="760" y="206" width="170" height="54" rx="8"/>
  <text class="label" x="792" y="228">flush trigger</text>
  <text class="small" x="788" y="248">PULSUS_BATCH_BYTES or MS</text>
  <path class="arrow" d="M 845 168 V 204"/>
</svg>
