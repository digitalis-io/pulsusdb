# Reference Tempo config for the M4 traces differential (issue #60,
# `e2e/src/traces.rs`'s `traces_differential` scenario). Monolithic
# single-binary mode against local storage — KISS: no TLS, no auth, no
# DNS (the collector reaches the OTLP gRPC receiver by this service's
# static ipv4_address, `deploy/e2e/compose.single.yaml`).
#
# Pinned image: grafana/tempo:3.0.2 (see compose.single.yaml for the
# digest — tag AND digest, the prom/prometheus:v3.13.0 precedent;
# upgrades are deliberate future commits, never floating). Note for that
# future upgrade path: Tempo 3.x's single-binary mode has no `ingester`
# config block (the 2.x flush/complete-block tuning knobs are gone —
# `field ingester not found` on boot); recent traces are served from the
# live store, and the harness's bounded completeness pre-checks
# (trace-by-ID first, then search visibility) absorb the remaining
# ingest-to-searchable lag without fixed sleeps.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
