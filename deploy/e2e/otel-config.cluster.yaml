# e2e cluster otel-collector config (issue #7 review fix): identical to the
# root `otel-config.yaml` except the exporter target is `pulsusdb`'s static
# `ipv4_address` for this variant (deploy/e2e/compose.cluster.yaml,
# 172.28.0.20), not its DNS hostname — the whole point of this overlay's
# static-IP network is that no inter-container hostname resolution is
# required, and that must hold for the collector's outbound target too.
#
# logs-only pipeline (issue #15 architect plan) — see
# otel-config.single.yaml's identical note.
#
# Explicit `0.0.0.0` binds (CI regression fix, issue #15) — see
# otel-config.single.yaml's identical note: modern `otel-collector-contrib`
# otherwise defaults the `otlp` receiver to `localhost`-only endpoints
# inside the container, unreachable through the published port
# (`deploy/e2e/compose.cluster.yaml`'s `4318:4318`) the harness uses.
receivers:
  otlp:
    protocols: { grpc: { endpoint: 0.0.0.0:4317 }, http: { endpoint: 0.0.0.0:4318 } }

exporters:
  otlphttp:
    endpoint: http://172.28.0.20:3100

service:
  pipelines:
    logs: { receivers: [otlp], exporters: [otlphttp] }
    # metrics/traces/profiles pipelines land with their own milestones (M2/M4/M5)
