# e2e single-node override (issue #7) on the root `docker-compose.yaml`
# quickstart: builds `pulsusdb` from source (local `pulsusdb:e2e` tag)
# instead of pulling the not-yet-published `ghcr.io` image, adds a `/ready`
# healthcheck, and puts every service on a fixed-subnet network with a
# static `ipv4_address` each (KISS directive, same convention as issue #5's
# `ci/clickhouse-cluster/compose.yaml`) — `pulsusdb` reaches ClickHouse by
# that static IP (`CLICKHOUSE_SERVER` below), not the base file's
# `clickhouse` DNS hostname, so the stack does not depend on inter-container
# DNS resolution working under every compose implementation.
#
# `${PULSUS_E2E_ROOT}` is set by the harness (`e2e/src/engine.rs`) to the
# repository root, so `build.context` resolves correctly regardless of
# which compose file in the `-f` list a given runtime treats as the base
# for relative paths.
#
# Used by `cargo run -p pulsus-e2e -- --variant single`; driven directly:
#   podman-compose -f docker-compose.yaml -f deploy/e2e/compose.single.yaml -p pulsus-e2e-single up -d
#   # or: docker compose -f docker-compose.yaml -f deploy/e2e/compose.single.yaml -p pulsus-e2e-single up -d
#
# No top-level `version:` key — Compose Specification, not the legacy
# versioned schema (both Docker and Podman Compose warn "the attribute
# `version` is obsolete" when it's present; this was pure CI log noise).

networks:
  pulsus-e2e-single:
    name: pulsus-e2e-single
    ipam:
      config:
        - subnet: 172.29.0.0/24

services:
  clickhouse:
    # The official image restricts the passwordless `default` user to
    # `127.0.0.1`/`::1` whenever neither `CLICKHOUSE_USER` nor
    # `CLICKHOUSE_PASSWORD` is set, which also blocks `pulsusdb`'s own
    # container-to-container connection — same fixture, same fix issue #5
    # already applies for the schema-it CI legs.
    volumes:
      - ${PULSUS_E2E_ROOT}/ci/clickhouse-cluster/users.d/network.xml:/etc/clickhouse-server/users.d/network.xml:ro
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.10

  pulsusdb:
    build:
      context: ${PULSUS_E2E_ROOT}
    image: pulsusdb:e2e
    environment:
      CLICKHOUSE_SERVER: "172.29.0.10" # the `clickhouse` service's static ipv4_address, not its DNS name
      # M1 log-query compat aliases (issue #14, docs/api.md §8.1) — on for
      # this variant so the `grafana` service below can exercise the
      # `/loki/api/v1/*` surface through a real Loki datasource.
      PULSUS_COMPAT_ENDPOINTS: "true"
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.11
    # Plain start-order form, replacing the base file's
    # `condition: service_healthy` — the harness polls `/ready` itself
    # rather than trusting compose's health condition, whose semantics
    # (and, on older Podman, reliability) differ across implementations
    # (architect plan edge case).
    depends_on: [ clickhouse ]
    ports: [ "3100:3100" ]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  otel-collector:
    # Overrides the base file's `./otel-config.yaml` mount (whose exporter
    # targets the `pulsusdb` DNS hostname) with an e2e-only config whose
    # exporter targets `pulsusdb`'s static ipv4_address (172.29.0.11) below
    # — the collector's outbound target must avoid inter-container DNS
    # exactly like every other service on this network (review fix).
    volumes:
      - ${PULSUS_E2E_ROOT}/deploy/e2e/otel-config.single.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.12
    # Published so the harness (`e2e/src/scenarios.rs`'s `logs_roundtrip`)
    # can push OTLP/HTTP JSON fixtures straight into the collector's `otlp`
    # receiver (issue #15) — the same static-IP-only-inside-the-network
    # discipline this file's other services follow does not apply to the
    # harness process itself, which runs on the host.
    ports: [ "4318:4318" ]

  # The M2 differential-accuracy scenario's reference backend (issue #33
  # architect plan, `e2e/src/metrics.rs`'s `metrics_differential`): the
  # collector's second `prometheusremotewrite` exporter target
  # (`otel-config.single.yaml`) receives the same OTLP-derived corpus
  # PulsusDB does, so the two can be diffed. Same image `#32`'s golden
  # fixtures are captured from — pin/digest kept in sync with that issue's
  # own image reference. `--web.enable-remote-write-receiver` is what
  # makes `POST /api/v1/write` accept the collector's export (KISS: no
  # TLS, static IP, no DNS — same convention as every other service on
  # this network).
  prometheus:
    image: prom/prometheus:v3.13.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      # Issue #84 (M6-08b): duration expressions are gated behind this
      # feature flag at v3.13.0 (OFF by default) — the oracle's feature
      # set must match the pulsus experimental gate the differential
      # harness evaluates under.
      - --enable-feature=promql-duration-expr
      # Issue #86 (M6-08d): delayed __name__ removal is PulsusDB's sole,
      # unconditional evaluation model (the corpus oracle's own mode,
      # promqltest test.go:111) — the reference backend must run the same
      # opt-in flag so the differential validates live parity under
      # matching flag state (adjudicated on #86).
      - --enable-feature=promql-delayed-name-removal
    volumes:
      - ${PULSUS_E2E_ROOT}/deploy/e2e/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.14
    # Published so the harness's completeness/query-matrix HTTP client
    # (running on the host, like every other Ctx.http call) can drive
    # `/api/v1/*` directly against it — same rationale as `pulsusdb`'s own
    # `:3100` publish above.
    ports: [ "9090:9090" ]

  # The M4 traces-differential reference backend (issue #60,
  # `e2e/src/traces.rs`'s `traces_differential`): receives the identical
  # OTLP traces corpus via the collector's `otlp/tempo` exporter
  # (`otel-config.single.yaml`) so trace-by-ID span sets and search
  # trace-ID sets can be diffed. Pinned by tag AND digest (task-manager
  # adjudication 2, the prom/prometheus:v3.13.0 precedent) — grafana/tempo
  # 3.0.2, multi-arch manifest digest recorded below; upgrades are
  # deliberate future commits, never floating. Single-variant only
  # (adjudication 1: the differential rides e2e-single; the cluster
  # overlay ships no tempo service). Config notes: deploy/e2e/tempo.yaml.
  tempo:
    image: grafana/tempo:3.0.2@sha256:cda87c212d8c584dc0b89e337e7ed648a5100feb657e5d528480ee4fa03dbbe3
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ${PULSUS_E2E_ROOT}/deploy/e2e/tempo.yaml:/etc/tempo.yaml:ro
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.15
    # Published so the harness's differential HTTP client (running on
    # the host, like every other Ctx.http call) can drive
    # `/api/traces/{id}` + `/api/search` directly — same rationale as
    # `prometheus`'s `:9090` publish above.
    ports: [ "3200:3200" ]

  # The M6-09 LogQL-pipeline differential's reference backend
  # (`e2e/src/logs.rs`'s `logs_pipeline_differential`, nightly/dispatch
  # tier): receives the identical OTLP logs corpus via the collector's
  # `otlphttp/loki` exporter fan-out (`otel-config.single.yaml`) so
  # pipeline query results can be diffed set-equal. Pinned by tag AND
  # digest (the grafana/tempo:3.0.2 / prom/prometheus:v3.13.0 precedent
  # — multi-arch manifest-list digest recorded at pull time; upgrades
  # are deliberate future commits, never floating). Single-variant only,
  # like `tempo`. Host publish is `3101` (pulsusdb owns host `3100`;
  # distinct static IPs mean no in-network conflict). Config notes:
  # deploy/e2e/loki.yaml.
  loki:
    image: grafana/loki:3.4.2@sha256:58a6c186ce78ba04d58bfe2a927eff296ba733a430df09645d56cdc158f3ba08
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ${PULSUS_E2E_ROOT}/deploy/e2e/loki.yaml:/etc/loki/config.yaml:ro
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.16
    # Published so the harness's differential HTTP client (running on the
    # host, like every other Ctx.http call) can drive
    # `/loki/api/v1/query_range` directly — same rationale as `tempo`'s
    # `:3200` publish above.
    ports: [ "3101:3100" ]

  # Grafana, provisioned with a Loki datasource pointed at pulsusdb's compat
  # surface (issue #14, task-manager-approved option A): proves alias
  # routing + Loki-datasource compatibility end to end via
  # `e2e/src/scenarios.rs`'s `grafana_loki_compat` scenario. Anonymous
  # Editor access — no login flow needed for the scenario's HTTP client to
  # drive `/api/ds/query`. Single-variant only (not part of the cluster
  # overlay).
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Editor"
    volumes:
      - ${PULSUS_E2E_ROOT}/deploy/e2e/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      pulsus-e2e-single:
        ipv4_address: 172.29.0.13
    depends_on: [ pulsusdb ]
    ports: [ "3000:3000" ]
