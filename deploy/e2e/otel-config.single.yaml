# e2e single-node otel-collector config (issue #7 review fix): identical to
# the root `otel-config.yaml` except the exporter target is `pulsusdb`'s
# static `ipv4_address` for this variant (deploy/e2e/compose.single.yaml,
# 172.29.0.11), not its DNS hostname â€” the whole point of this overlay's
# static-IP network is that no inter-container hostname resolution is
# required, and that must hold for the collector's outbound target too.
#
# logs + metrics + traces pipelines (issue #15/#33/#60): `pulsusdb`
# mounts no profiles ingest route yet (M5), so that pipeline would 404
# against it on every export attempt and spam the collector's own log â€”
# trimmed until the milestone that adds it lands.
#
# Explicit `0.0.0.0` binds (CI regression fix, issue #15): modern
# `otel-collector-contrib` defaults the `otlp` receiver's `grpc`/`http`
# endpoints to `localhost:4317`/`localhost:4318` *inside the container*
# when no `endpoint` is given â€” reachable from another container sharing
# its network namespace, but not through a published Docker/Podman port
# (which connects to the container's external interface, not loopback).
# The harness's `logs_roundtrip`/`metrics_differential` scenarios push
# fixtures through exactly that published port
# (`deploy/e2e/compose.single.yaml`'s `4318:4318`), so the bind must be
# explicit.
receivers:
  otlp:
    protocols: { grpc: { endpoint: 0.0.0.0:4317 }, http: { endpoint: 0.0.0.0:4318 } }

exporters:
  otlphttp:
    endpoint: http://172.29.0.11:3100
  # The M2 differential-accuracy scenario's whole validity (issue #33
  # architect plan) rests on both exporters below being **identical**
  # except for their `endpoint` â€” a single OTLPâ†’PRW conversion fanning out
  # to two independently-queued/retried `prometheusremotewrite` exporters,
  # never OTLP-to-one + PRW-to-the-other (which would risk labeling/suffix/
  # temporality skew and invalidate the differential). `add_metric_suffixes:
  # false` keeps metric names identical on both sides (no collector-side
  # unit-suffix rewriting); identifying labels travel as OTLP datapoint
  # attributes (`e2e/src/corpus.rs`), not resource attributes, so no
  # `resource_to_telemetry_conversion` setting is needed either.
  prometheusremotewrite/pulsus:
    endpoint: http://172.29.0.11:3100/api/v1/write
    add_metric_suffixes: false
  prometheusremotewrite/prom:
    endpoint: http://172.29.0.14:9090/api/v1/write
    add_metric_suffixes: false
  # The M4 traces-differential fan-out's second leg (issue #60): the
  # same received OTLP traces go verbatim to the pinned reference Tempo
  # (`deploy/e2e/compose.single.yaml`'s `tempo`, static ipv4_address
  # 172.29.0.15) over OTLP/gRPC â€” its receiver is wired in
  # `deploy/e2e/tempo.yaml`. The first leg is the existing `otlphttp`
  # exporter above, whose OTLP/HTTP export appends `/v1/traces` onto
  # pulsusdb's `:3100` automatically. Both stores therefore ingest the
  # collector's identical typed span data (plan v2 delta 1), which is
  # what makes the set differential valid.
  otlp/tempo:
    endpoint: 172.29.0.15:4317
    tls:
      insecure: true

service:
  pipelines:
    logs: { receivers: [otlp], exporters: [otlphttp] }
    metrics: { receivers: [otlp], exporters: [prometheusremotewrite/pulsus, prometheusremotewrite/prom] }
    traces: { receivers: [otlp], exporters: [otlphttp, otlp/tempo] }
    # the profiles pipeline lands with its own milestone (M5)
