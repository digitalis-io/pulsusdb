suite: cluster (topology=cluster, clickhouse.shards=3) render — AC #3
release:
  name: pulsusdb
  namespace: default
set:
  topology: cluster
  clickhouse.shards: 3
templates:
  - clickhouse-shard-statefulset.yaml
  - clickhouse-cluster-configmap.yaml
  - clickhouse-keeper-statefulset.yaml
  - clickhouse-keeper-configmap.yaml
  - configmap.yaml
tests:
  - it: given shards=3, when rendering shard workloads, then 3 distinct shard StatefulSets + headless Services are produced
    templates:
      - clickhouse-shard-statefulset.yaml
    asserts:
      - hasDocuments:
          count: 6 # Service + StatefulSet per shard
      - equal:
          path: metadata.name
          value: pulsusdb-clickhouse-shard-0
        documentIndex: 0
      - equal:
          path: metadata.name
          value: pulsusdb-clickhouse-shard-0
        documentIndex: 1
      - equal:
          path: metadata.name
          value: pulsusdb-clickhouse-shard-1
        documentIndex: 2
      - equal:
          path: metadata.name
          value: pulsusdb-clickhouse-shard-2
        documentIndex: 4
      - isKind:
          of: StatefulSet
        documentIndex: 1

  - it: given shards=3, when rendering the cluster ConfigMap, then remote_servers.xml enumerates all 3 shards with distinct hosts
    templates:
      - clickhouse-cluster-configmap.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["remote_servers.xml"]
          pattern: "pulsusdb-clickhouse-shard-0\\."
      - matchRegex:
          path: data["remote_servers.xml"]
          pattern: "pulsusdb-clickhouse-shard-1\\."
      - matchRegex:
          path: data["remote_servers.xml"]
          pattern: "pulsusdb-clickhouse-shard-2\\."
      - matchRegex:
          path: data["remote_servers.xml"]
          pattern: "<internal_replication>true</internal_replication>"

  - it: given shards=3, when rendering per-shard macros, then each shard gets a distinct macros.xml
    templates:
      - clickhouse-cluster-configmap.yaml
    asserts:
      - matchRegex:
          path: data["macros.xml"]
          pattern: "<shard>0</shard>"
        documentIndex: 1
      - matchRegex:
          path: data["macros.xml"]
          pattern: "<shard>1</shard>"
        documentIndex: 2
      - matchRegex:
          path: data["macros.xml"]
          pattern: "<shard>2</shard>"
        documentIndex: 3

  - it: given topology=cluster, when rendering pulsusdb's own ConfigMap, then it carries a single cluster-entry server + cluster name (never a shard list — the product's real connection model)
    templates:
      - configmap.yaml
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "server: pulsusdb-clickhouse-shard-0\\b"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "cluster: pulsus_cluster"

  - it: given topology=cluster, when rendering, then a single Keeper StatefulSet is produced
    templates:
      - clickhouse-keeper-statefulset.yaml
    asserts:
      - hasDocuments:
          count: 2 # Service + StatefulSet (config lives in clickhouse-keeper-configmap.yaml)
      - isKind:
          of: StatefulSet
        documentIndex: 1
      - equal:
          path: spec.replicas
          value: 1
        documentIndex: 1

  - it: given topology=cluster, when rendering remote_servers.xml, then the inter-node <secret> is Secret-sourced via from_env, never a literal value (code review round-1 finding #1)
    templates:
      - clickhouse-cluster-configmap.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["remote_servers.xml"]
          pattern: '<secret from_env="CLICKHOUSE_INTERSERVER_SECRET"/>'
      - notMatchRegex:
          path: data["remote_servers.xml"]
          pattern: "<secret>[^<]+</secret>"

  - it: given topology=cluster, when rendering interserver_http_credentials, then the password is Secret-sourced via from_env, never a literal value
    templates:
      - clickhouse-cluster-configmap.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["interserver-credentials.xml"]
          pattern: '<password from_env="CLICKHOUSE_INTERSERVER_SECRET"/>'
      - notMatchRegex:
          path: data["interserver-credentials.xml"]
          pattern: "<password>[^<]+</password>"

  - it: given topology=cluster, when rendering a shard StatefulSet, then it sources CLICKHOUSE_INTERSERVER_SECRET from the generated ClickHouse Secret
    templates:
      - clickhouse-shard-statefulset.yaml
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CLICKHOUSE_INTERSERVER_SECRET
            valueFrom:
              secretKeyRef:
                name: pulsusdb-clickhouse
                key: interserver-secret

  - it: given a shard's readOnlyRootFilesystem is true, when rendering, then a writable users.d volume is always mounted (round-2 code-review [high] regression fix, same as the single-node StatefulSet)
    templates:
      - clickhouse-shard-statefulset.yaml
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: users-d
            mountPath: /etc/clickhouse-server/users.d

  - it: given topology=cluster, when rendering the Keeper StatefulSet, then it sources CLICKHOUSE_INTERSERVER_SECRET identically to the shards (round-2 code-review [low] finding #4) and mounts a writable log volume (round-2 [high] regression fix — the entrypoint fails closed without one under readOnlyRootFilesystem, boot-verified against the pinned image)
    templates:
      - clickhouse-keeper-statefulset.yaml
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CLICKHOUSE_INTERSERVER_SECRET
            valueFrom:
              secretKeyRef:
                name: pulsusdb-clickhouse
                key: interserver-secret
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: log
            mountPath: /var/log/clickhouse-keeper
      - contains:
          path: spec.template.spec.volumes
          content:
            name: log
            emptyDir: {}
