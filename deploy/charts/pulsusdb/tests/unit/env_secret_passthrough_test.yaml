suite: env / secret passthrough (including env-over-YAML precedence and extraEnv)
release:
  name: pulsusdb
  namespace: default
templates:
  - deployment-all.yaml
  - secret.yaml
  - clickhouse-secret.yaml
  - configmap.yaml
tests:
  - it: given no pulsusdb.auth.password, when rendering, then no PULSUS_AUTH_PASSWORD env var and no auth Secret are produced (no auth by default)
    templates:
      - deployment-all.yaml
      - secret.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PULSUS_AUTH_PASSWORD
          any: true
        template: deployment-all.yaml
      - hasDocuments:
          count: 0
        template: secret.yaml

  - it: given pulsusdb.auth.password is set, when rendering, then PULSUS_AUTH_PASSWORD is Secret-sourced (env wins over the YAML file's unset auth_password — docs/configuration.md precedence) and the chart-managed auth Secret carries the value
    set:
      pulsusdb.auth.password: "s3cret"
    templates:
      - deployment-all.yaml
      - secret.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PULSUS_AUTH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pulsusdb-auth
                key: PULSUS_AUTH_PASSWORD
        template: deployment-all.yaml
      - equal:
          path: stringData.PULSUS_AUTH_PASSWORD
          value: "s3cret"
        template: secret.yaml

  - it: given pulsusdb.auth.existingSecret is set, when rendering, then the chart's own auth Secret is skipped and the container references the existingSecret instead
    set:
      pulsusdb.auth.password: "s3cret"
      pulsusdb.auth.existingSecret: my-own-secret
    templates:
      - deployment-all.yaml
      - secret.yaml
    asserts:
      - hasDocuments:
          count: 0
        template: secret.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PULSUS_AUTH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-own-secret
                key: PULSUS_AUTH_PASSWORD
        template: deployment-all.yaml

  - it: given clickhouse.auth.existingSecret is set, when rendering, then the chart's own bundled ClickHouse Secret is skipped and CLICKHOUSE_AUTH derives from the existingSecret's key
    set:
      clickhouse.auth.existingSecret: my-ch-secret
      clickhouse.auth.existingSecretPasswordKey: ch-password
    templates:
      - deployment-all.yaml
      - clickhouse-secret.yaml
    asserts:
      - hasDocuments:
          count: 0
        template: clickhouse-secret.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CLICKHOUSE_AUTH_PASSWORD_ONLY
            valueFrom:
              secretKeyRef:
                name: my-ch-secret
                key: ch-password
        template: deployment-all.yaml

  - it: given pulsusdb.extraEnv, when rendering, then the extra vars are appended after the chart's own env vars (so they can override)
    set:
      pulsusdb.extraEnv:
        - name: PULSUS_LOG_LEVEL
          value: debug
    templates:
      - deployment-all.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[-1].name
          value: PULSUS_LOG_LEVEL
      - equal:
          path: spec.template.spec.containers[0].env[-1].value
          value: debug
