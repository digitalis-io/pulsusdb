[pytest]
# Step modules double as pytest-bdd's collected test modules (each calls
# `scenarios(...)`, which generates the actual `test_*` functions pytest
# discovers) — named `*_steps.py` per the issue #38 plan's file layout,
# not the default `test_*.py`/`*_test.py`, so collection is widened here.
python_files = *_steps.py
