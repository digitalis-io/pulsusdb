# Source: pulsusdb/templates/otel-collector-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsusdb-otel-collector-config
  labels:
    helm.sh/chart: pulsusdb-0.1.0
    app.kubernetes.io/name: pulsusdb
    app.kubernetes.io/instance: pulsusdb
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols: { grpc: { endpoint: 0.0.0.0:4317 }, http: { endpoint: 0.0.0.0:4318 } }

    exporters:
      otlphttp:
        endpoint: http://pulsusdb:3100
      prometheusremotewrite/pulsus:
        endpoint: http://pulsusdb:3100/api/v1/write
        add_metric_suffixes: false

    service:
      pipelines:
        logs: { receivers: [otlp], exporters: [otlphttp] }
        metrics: { receivers: [otlp], exporters: [prometheusremotewrite/pulsus] }
        # traces/profiles pipelines land with their own milestones (M4/M5)
