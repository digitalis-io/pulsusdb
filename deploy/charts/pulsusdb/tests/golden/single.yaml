# Source: pulsusdb/templates/clickhouse-statefulset-single.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pulsusdb-clickhouse
  labels:
    helm.sh/chart: pulsusdb-0.1.0
    app.kubernetes.io/name: pulsusdb
    app.kubernetes.io/instance: pulsusdb
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: pulsusdb-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsusdb
      app.kubernetes.io/instance: pulsusdb
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        helm.sh/chart: pulsusdb-0.1.0
        app.kubernetes.io/name: pulsusdb
        app.kubernetes.io/instance: pulsusdb
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: clickhouse
      annotations:
        checksum/secret: ec729a4d2f4ee1e04f118cd2d6341b3194f43564abe9ff20143d3d2a2305955f
    spec:
      securityContext:
        fsGroup: 101
        runAsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clickhouse
          image: docker.io/clickhouse/clickhouse-server:24.8.14
          env:
            - name: CLICKHOUSE_DB
              value: pulsus
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulsusdb-clickhouse
                  key: password
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ping, port: http }
            periodSeconds: 5
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: log
              mountPath: /var/log/clickhouse-server
            - name: tmp
              mountPath: /tmp
            - name: users-d
              mountPath: /etc/clickhouse-server/users.d
      volumes:
        - name: log
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: users-d
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
