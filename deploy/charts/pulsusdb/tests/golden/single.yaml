apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsusdb
  labels:
    helm.sh/chart: pulsusdb-0.1.0
    app.kubernetes.io/name: pulsusdb
    app.kubernetes.io/instance: pulsusdb
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: all
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsusdb
      app.kubernetes.io/instance: pulsusdb
      app.kubernetes.io/component: all
  template:
    metadata:
      labels:
        helm.sh/chart: pulsusdb-0.1.0
        app.kubernetes.io/name: pulsusdb
        app.kubernetes.io/instance: pulsusdb
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: all
      annotations:
        checksum/config: 74d397ebd3a0b8ebf8be502327e459323de11b294c37e86dd1d534b418f1267d
        checksum/secret: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
    spec:
      serviceAccountName: pulsusdb
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        -
          name: pulsusdb
          image: ghcr.io/digitalis-io/pulsusdb:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --mode
            - all
            - --config
            - /etc/pulsusdb/config.yaml
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          env:
            - name: CLICKHOUSE_AUTH_PASSWORD_ONLY
              valueFrom:
                secretKeyRef:
                  name: pulsusdb-clickhouse
                  key: password
            - name: CLICKHOUSE_AUTH
              value: "default:$(CLICKHOUSE_AUTH_PASSWORD_ONLY)"
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 10
            tcpSocket:
              port: 3100
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: 3100
            periodSeconds: 5
          startupProbe:
            failureThreshold: 60
            periodSeconds: 5
            tcpSocket:
              port: 3100
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/pulsusdb
              readOnly: true
            - name: spool
              mountPath: /var/lib/pulsusdb
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: pulsusdb-config
        - name: spool
          emptyDir: {}
        - name: tmp
          emptyDir: {}
