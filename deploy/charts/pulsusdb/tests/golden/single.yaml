    downsampling:
      enabled: false
      raw_retention: null
      tier_policy: exact
      tiers: []
    host: 0.0.0.0
    log_level: info
    log_rollup_resolution: 5s
    port: 3100
    query_timeout: 2m
    reader:
      cache_max_series: 50000
      cache_ttl: 60s
      cache_window: 24h
      logql_scan_budget_bytes: 50GiB
      promql_lookback: 5m
      promql_max_samples: 50000000
      series_activity_bucket: 1h
      traceql_max_candidates: 100000
    retention_days: 7
    rotation_interval: 1h
    ruler:
      enabled: false
      max_result_bytes: 10MiB
      poll_interval: 30s
    skip_ddl: false
    skip_unavailable_shards: false
    storage_policy: null
    writer:
      batch_bytes: 16MiB
      batch_ms: 200
      ingest_queue_bytes: 256MiB
      insert_mode: sync
