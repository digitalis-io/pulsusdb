apiVersion: v1
kind: Pod
metadata:
  name: pulsusdb-test-ready
  labels:
    helm.sh/chart: pulsusdb-0.1.0
    app.kubernetes.io/name: pulsusdb
    app.kubernetes.io/instance: pulsusdb
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-ready
      image: ghcr.io/digitalis-io/pulsusdb:0.1.0
      command: ["sh", "-c"]
      args:
        - >-
          wget --spider -q http://pulsusdb:3100/ready
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
