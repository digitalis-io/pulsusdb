    spec:
      serviceAccountName: pulsusdb
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        -
          name: pulsusdb
          image: ghcr.io/digitalis-io/pulsusdb:0.1.0
