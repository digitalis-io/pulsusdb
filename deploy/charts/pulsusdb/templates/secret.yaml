{{/*
Renders only when `pulsusdb.auth.password` is set directly (not via
`existingSecret`) — HTTP Basic auth is off by default (docs/
configuration.md §1: both `auth_user`/`auth_password` unset => no auth).
Never appears in the ConfigMap (`templates/configmap.yaml`); injected as
`PULSUS_AUTH_PASSWORD` (env wins over YAML) by `_helpers.tpl`'s
`pulsusdb.commonEnv`.
*/}}
{{- if and .Values.pulsusdb.auth.password (not .Values.pulsusdb.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pulsusdb.fullname" . }}-auth
  labels:
    {{- include "pulsusdb.labels" . | nindent 4 }}
type: Opaque
stringData:
  PULSUS_AUTH_PASSWORD: {{ .Values.pulsusdb.auth.password | quote }}
{{- end }}
