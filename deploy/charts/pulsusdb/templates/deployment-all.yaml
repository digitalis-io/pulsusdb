{{/*
Rendered when `pulsusdb.split.enabled=false` (default): one `--mode all`
Deployment (schema controller + writer + reader in one process,
docs/architecture.md §1) — the single-node topology mirroring
`deploy/e2e/compose.single.yaml`. Never a StatefulSet: PulsusDB processes
are stateless (all durable state lives in ClickHouse; the only writable
path is the insert-failure spool, backed by `pulsusdb.volumes`' `spool`
volume, not identity-addressed storage).
*/}}
{{- if not .Values.pulsusdb.split.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pulsusdb.fullname" . }}
  labels:
    {{- include "pulsusdb.componentLabels" (dict "root" . "component" "all") | nindent 4 }}
spec:
  replicas: {{ .Values.pulsusdb.replicaCount }}
  selector:
    matchLabels:
      {{- include "pulsusdb.componentSelectorLabels" (dict "root" . "component" "all") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pulsusdb.componentLabels" (dict "root" . "component" "all") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "pulsusdb.checksums" $ | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "pulsusdb.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - {{- include "pulsusdb.container" (dict "root" . "mode" "all" "resources" .Values.pulsusdb.resources) | nindent 10 }}
      volumes:
        {{- include "pulsusdb.volumes" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
