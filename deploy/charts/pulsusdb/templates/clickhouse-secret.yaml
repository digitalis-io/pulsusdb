{{/*
Bundled ClickHouse is never passwordless (issue #38 plan amendment §4,
review finding [medium]): a random password is generated on first
install and persisted — `lookup` reads any existing Secret of this name
first so `helm upgrade` never rotates it out from under a running
ClickHouse (a rotated password here would desync the ConfigMap-independent
`CLICKHOUSE_AUTH` env every pulsusdb pod already has cached until its next
restart). Skipped entirely when `clickhouse.auth.existingSecret` is set —
the operator owns that Secret's lifecycle instead.

`interserver-secret` (code review round-1 [high] finding #1) is generated
and preserved the same way — the shared value `remote_servers.xml`'s
`<secret>` and `interserver_http_credentials` both pull via `from_env`
(cluster mode only, but generated unconditionally here so a later
`topology: single` -> `cluster` switch never needs a manual migration
step). `hasKey` guards each key independently so upgrading a release
whose existing Secret predates one of these two keys generates only the
missing one, instead of erroring on a nil map index.
*/}}
{{- if and .Values.clickhouse.enabled (not .Values.clickhouse.auth.existingSecret) }}
{{- $secretName := include "pulsusdb.clickhouseFullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- $interserverSecret := "" }}
{{- if and $existing (hasKey $existing.data "password") }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
{{- if and $existing (hasKey $existing.data "interserver-secret") }}
{{- $interserverSecret = index $existing.data "interserver-secret" | b64dec }}
{{- else }}
{{- $interserverSecret = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "pulsusdb.componentLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
type: Opaque
stringData:
  password: {{ $password | quote }}
  interserver-secret: {{ $interserverSecret | quote }}
{{- end }}
