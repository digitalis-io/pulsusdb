name: Release

# Tag-triggered publish (issue #23): a push of a `vX.Y.Z[-pre]` tag builds the
# repo `Dockerfile` (issue #7) and publishes it to GHCR as a multi-arch OCI
# image index (linux/amd64 + linux/arm64, issue #42). No `edge`/`main` image
# on every push — that is explicitly out of scope for this issue
# (docs/releasing.md notes it as a possible follow-up).
#
# `workflow_dispatch` (issue #42) is a build-only dry-run: it compiles both
# arches under QEMU with no push and no load, so a maintainer can prove the
# arm64 build works pre-merge (the tag-only trigger otherwise gives no such
# gate — the first real multi-arch build would only ever be a release).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least-privilege: `packages: write` is the only extra permission this job
# needs to push to GHCR via the ambient `GITHUB_TOKEN` (no PAT). `contents:
# read` is enough to check out the tag. (Keyless cosign in #44 adds
# `id-token: write` here — that line is #44's to add, not #42's.)
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }

      # QEMU registers the arm64 binfmt handler used both to build the
      # emulated linux/arm64 image stage and to `docker run --platform
      # linux/arm64` the arm64 smoke test below (issue #42).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag/label derivation. `flavor: latest=auto` + `type=semver` is what
      # gives us the prerelease-suppression contract this workflow relies
      # on: metadata-action@v5's documented `type=semver` behaviour is that
      # a prerelease ref (e.g. `v2.0.8-beta.67`) emits *only* the exact
      # `{{version}}` tag — `{{major}}.{{minor}}`/`{{major}}` and `latest`
      # are all withheld — while a stable ref emits all three (architect
      # plan amendment, issue #23). This is pinned to metadata-action@v5;
      # bumping that major requires re-verifying this suppression behaviour
      # against its changelog before trusting it again.
      #
      # Tag-path only: a non-tag `workflow_dispatch` ref has no semver, so
      # metadata-action would emit no version/tags — the dry-run below is a
      # build check, not a publish, and references none of these outputs.
      - id: meta
        if: github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/digitalis-io/pulsusdb
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.licenses=AGPL-3.0-only

      # Build-only dry-run (workflow_dispatch, issue #42): compile BOTH arches
      # under QEMU with no push and no load — `type=cacheonly` discards the
      # result, so this step succeeds iff the Dockerfile builds for
      # linux/amd64 AND linux/arm64. A multi-platform build cannot be `load`ed
      # into the daemon (no manifest list) and there is nothing to push or
      # `imagetools inspect` here, so this is deliberately just the build
      # gate the tag-only release otherwise lacks. It warms the same gha
      # cache scope, so a subsequent real tag reuses these layers.
      - name: Dry-run multi-arch build (no push, no load)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=cacheonly
          build-args: |
            PULSUS_BUILD_VERSION=${{ github.ref_name }}
            PULSUS_BUILD_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=pulsusdb-release
            type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-release

      # 1) Per-arch build + load + smoke, BEFORE anything is pushed — a
      #    failing smoke test must never leave a broken tag on GHCR. `load:
      #    true` is single-platform only (it cannot load a manifest list), so
      #    each arch is built + loaded under its own local `release-smoke-*`
      #    tag (distinct tags avoid a same-tag/two-arch load collision) and
      #    smoke-tested with an explicit `--platform`. arm64 runs under QEMU.
      #    All tag-path only; the dry-run above already covered the build.
      - id: build-amd64
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: pulsusdb:release-smoke-amd64
          build-args: |
            PULSUS_BUILD_VERSION=${{ github.ref_name }}
            PULSUS_BUILD_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=pulsusdb-release
            type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-release

      - name: Smoke test amd64 (version+revision stamp, non-root, spool writable)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          IMG=pulsusdb:release-smoke-amd64
          PLATFORM=linux/amd64
          OUT=$(docker run --rm --platform "$PLATFORM" "$IMG" --version)
          echo "$OUT"
          # clap prints: "pulsusdb <VERSION> (<REVISION>)". PULSUS_BUILD_REVISION
          # is stamped verbatim (full 40-char github.sha, not --short) so this
          # matches the org.opencontainers.image.revision label byte-for-byte.
          # The stamp is arch-independent (clap output is identical on arm64).
          EXPECT="${{ steps.meta.outputs.version }} (${{ github.sha }})"
          echo "$OUT" | grep -qF "$EXPECT" \
            || { echo "::error::version/revision stamp mismatch; want '$EXPECT'"; exit 1; }
          docker run --rm --platform "$PLATFORM" "$IMG" --help >/dev/null
          test "$(docker run --rm --platform "$PLATFORM" --entrypoint id "$IMG" -u)" != "0"
          # Review fix (issue #23): the writer's insert-failure spool
          # (`./spool/{poison,uncertain}/<table>/`, docs/configuration.md
          # §5) is created lazily under the process's working directory —
          # prove the non-root `pulsus` user can actually create and write
          # it under the image's `/var/lib/pulsusdb` WORKDIR, since a
          # silent write failure there would only surface as a swallowed
          # spool error under a real insert failure, not a startup crash.
          docker run --rm --platform "$PLATFORM" --entrypoint sh "$IMG" -c \
            'mkdir -p ./spool/uncertain/probe && echo ok > ./spool/uncertain/probe/f && cat ./spool/uncertain/probe/f' \
            | grep -qF ok \
            || { echo "::error::pulsus (uid 10001) cannot write the spool dir under WORKDIR"; exit 1; }

      - id: build-arm64
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: pulsusdb:release-smoke-arm64
          build-args: |
            PULSUS_BUILD_VERSION=${{ github.ref_name }}
            PULSUS_BUILD_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=pulsusdb-release
            type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-release

      - name: Smoke test arm64 (version+revision stamp, non-root, spool writable)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          IMG=pulsusdb:release-smoke-arm64
          PLATFORM=linux/arm64
          OUT=$(docker run --rm --platform "$PLATFORM" "$IMG" --version)
          echo "$OUT"
          # Same assertion set as amd64 above, run against the QEMU-emulated
          # arm64 image; the version/revision stamp is arch-independent.
          EXPECT="${{ steps.meta.outputs.version }} (${{ github.sha }})"
          echo "$OUT" | grep -qF "$EXPECT" \
            || { echo "::error::version/revision stamp mismatch; want '$EXPECT'"; exit 1; }
          docker run --rm --platform "$PLATFORM" "$IMG" --help >/dev/null
          test "$(docker run --rm --platform "$PLATFORM" --entrypoint id "$IMG" -u)" != "0"
          docker run --rm --platform "$PLATFORM" --entrypoint sh "$IMG" -c \
            'mkdir -p ./spool/uncertain/probe && echo ok > ./spool/uncertain/probe/f && cat ./spool/uncertain/probe/f' \
            | grep -qF ok \
            || { echo "::error::pulsus (uid 10001) cannot write the spool dir under WORKDIR"; exit 1; }

      # 2) Push a single multi-arch manifest list (OCI index) only after both
      #    smoke tests above passed. Cache is warm from the per-arch builds,
      #    so this rebuild reuses those layers rather than recompiling arm64.
      #
      #    #44 (cosign) seam — do not remove/rename: `id: push` exposes
      #    `steps.push.outputs.digest`, the OCI *index* digest #44 signs
      #    (signing the index transitively covers both child manifests, so no
      #    per-arch signing). `provenance: false` pins the index to exactly
      #    the two platform manifests (deterministic for the verify step
      #    below); #44 re-enables `provenance:`/`sbom:` on THIS step and adds
      #    the cosign attest step.
      - id: push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PULSUS_BUILD_VERSION=${{ github.ref_name }}
            PULSUS_BUILD_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=pulsusdb-release
            type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-release

      # Post-push verification (tag path only): fail the job unless the
      # published index actually carries both arches.
      - name: Verify multi-arch manifest
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          IMG=ghcr.io/digitalis-io/pulsusdb:${{ steps.meta.outputs.version }}
          RAW=$(docker buildx imagetools inspect "$IMG" --raw)
          echo "$RAW"
          echo "$RAW" | grep -q '"architecture": *"amd64"' \
            || { echo "::error::amd64 missing from published index"; exit 1; }
          echo "$RAW" | grep -q '"architecture": *"arm64"' \
            || { echo "::error::arm64 missing from published index"; exit 1; }
