name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Issue #16: lets the manual-dispatch-only `bench-cluster` job (below) be
  # triggered on demand — the scale-invariant gates already run per-PR on
  # single-node (`schema-it`); the 4-shard leg is evidence-gathering, not
  # per-PR protection (task-manager resolution #4 on issue #16).
  workflow_dispatch:
  # Issue #33 amendment: keeps the literal docs/features.md §7 "10k
  # series" acceptance criterion continuously validated after #33's own
  # closure evidence (a green `e2e-metrics-full` run, both variants) —
  # per-PR CI continues to gate at the `ci` (~1k series) tier inside
  # `e2e-single`/`e2e-cluster` below; correctness is scale-invariant, so
  # the nightly/dispatch-only full tier is evidence-gathering, not per-PR
  # protection (same "PR gate vs. nightly reference profile" split as
  # issue #16's `bench-cluster`).
  schedule:
    - cron: "17 3 * * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"

      # Issue #87: pinned nextest for structured (JUnit) test output — the
      # summarizer steps below feed $GITHUB_STEP_SUMMARY. Bump the pin
      # deliberately; `latest` would make CI drift.
      - name: Install cargo-nextest (pinned)
        run: curl -LsSf https://get.nexte.st/0.9.140/linux | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Issue #87: same test set as `cargo test --workspace` (this is where
      # the hermetic conformance/drift suites — route_inventory and the
      # api_conformance/manifest unit halves — run), now via nextest so the
      # per-suite results land in the run summary. A failing test fails
      # this step exactly as before (ci/test-summary.sh propagates
      # nextest's exit code untouched).
      - name: Test
        run: ci/test-summary.sh run workspace --workspace

      # Issue #87 review adjudication: the hermetic conformance/drift
      # suites get their own named summary rows alongside the aggregate
      # `workspace` row above. These two steps re-run suites the workspace
      # step already ran — an accepted double-run costing seconds (both
      # binaries are already built; api_conformance's live tests
      # env-gate-skip here, its hermetic half is what's being surfaced).
      # `!cancelled()` (round-2 review): they still run — and still fail
      # the job on failure, no continue-on-error — when the aggregate
      # workspace step above is red, exactly the runs where per-suite
      # visibility matters most.
      - name: Route-inventory drift guard (dedicated summary row)
        if: '!cancelled()'
        run: ci/test-summary.sh run route_inventory -p pulsus-server --test route_inventory

      - name: API conformance, hermetic half (dedicated summary row)
        if: '!cancelled()'
        run: ci/test-summary.sh run api_conformance_hermetic -p pulsus-server --test api_conformance

      # nextest never runs doctests; keep them covered separately so the
      # switch above changes reporting only, never what runs.
      - name: Doctests
        run: cargo test --workspace --doc

      # Issue #87: per-suite results table on every run, pass or fail. The
      # summarizer never fails a green run — generation problems are
      # warnings only.
      - name: Write test results summary
        if: always()
        run: ci/test-summary.sh render

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ci
          path: target/test-summary/
          if-no-files-found: ignore

  # Issue #5: every DDL block in docs/schemas.md must be rendered and
  # executed against a fresh ClickHouse in CI. Single-node 24.8 leg (live
  # migration/MV tests, the `--mode init` create-then-no-op acceptance
  # criterion) plus a negative leg proving the < 24.8 version refusal.
  # Uses the runner's own docker (task-manager resolution #3 on issue #5);
  # local development uses podman against the same runtime-neutral fixtures.
  schema-it:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Issue #87: pinned nextest (same pin as the `ci` job) for the
      # API-suite steps' structured output below.
      - name: Install cargo-nextest (pinned)
        run: curl -LsSf https://get.nexte.st/0.9.140/linux | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"

      - name: Start ClickHouse 24.8
        run: |
          docker run -d --name pulsus-ch-schema-it -p 19123:8123 -p 19000:9000 \
            -v "$GITHUB_WORKSPACE"/ci/clickhouse-cluster/users.d/network.xml:/etc/clickhouse-server/users.d/zz-network.xml:ro \
            clickhouse/clickhouse-server:24.8
          for _ in $(seq 1 30); do
            curl -sf http://localhost:19123/ping && break
            sleep 1
          done

      - name: Live schema tests (single-node, migrations + MVs + crash/retry)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-schema --test live_schema

      # Issue #53: traces-family tables + tag-catalog MV, retention-change
      # propagation, and the two docs/schemas.md §4.2 EXPLAIN gates on a
      # seeded ≥100k-row corpus (EXPLAIN indexes=1 + query_log.projections —
      # `EXPLAIN projections=1` is 25.x-only). Reuses this job's 24.8
      # container.
      - name: Live traces schema tests (tables + MV + EXPLAIN gates)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-schema --test live_traces

      # Issue #11: docs/schemas.md §9's "EXPLAIN indexes = 1 output for the
      # canonical queries is snapshot-tested" gate for the LogQL read path —
      # reuses this job's ClickHouse 24.8 container verbatim.
      - name: LogQL EXPLAIN indexes gate
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test explain_indexes

      # Issue #55: the trace-by-ID point read's EXPLAIN primary-key gate
      # (PrimaryKey block keyed on trace_id, granules pruned) on a seeded
      # 100k-trace corpus, plus the TraceEngine fetch round-trip. Reuses
      # this job's ClickHouse 24.8 container.
      - name: Trace point-read EXPLAIN gate
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test traces_point_read

      # Issue #16, docs/schemas.md §9's two-tier model, Tier 1: the
      # scale-invariant system.query_log ratio gate for the logs read path
      # (CI-scale corpus). Reuses this job's ClickHouse 24.8 container.
      - name: LogQL query_log ratio gate (Tier 1)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test query_log_gates

      # Issue #16 plan amendment: licenses the direct RowBinary bulk-load
      # shortcut `xtask bench logs-read`'s dataset generator uses for the
      # CI-scale/Tier-2 corpora, by proving it is byte-identical to the
      # product OTLP ingest path against hand-derived golden fixtures.
      - name: Ingest fidelity gate (product ingest vs. bulk RowBinary)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-write --test ingest_fidelity

      # Issue #54 AC5: the OTLP traces round-trip — POST /v1/traces ->
      # TraceWriter (sync) -> exact count()s on both writer-written trace
      # tables, plus a live payload/FixedString wire-encoding read-back.
      # Reuses this job's ClickHouse 24.8 container.
      - name: Traces ingest round-trip (exact counts)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-write --test trace_ingest_roundtrip

      # Issue #34: the M2 label-resolution benchmark's `--profile ci` smoke
      # step — reproducibility + a committed CI-scale evidence artifact
      # only (task-manager resolution #2: no asserted `system.query_log`
      # ratio gate here, a follow-up once the report shows which ratios are
      # stable). `--profile ci` hard-codes a fixed, small cardinality set
      # ([1_000, 10_000, 50_000]) and rejects any `--metric-cardinalities`
      # override, so this step can never silently run the 5M-series
      # design-target shape in CI. Reuses this job's ClickHouse 24.8
      # container.
      - name: M2 metrics-labels benchmark (--profile ci smoke)
        run: |
          cargo run -p xtask -- bench metrics-labels \
            --http-url http://127.0.0.1:19123 --database pulsus_bench_metrics_ci \
            --profile ci --seed 42 --reps 3 --matcher-reps 200 \
            --out docs/benchmarks/data/metrics-labels-ci.json \
            --report-out /tmp/metrics-labels-ci.md

      - name: Upload M2 metrics-labels evidence
        uses: actions/upload-artifact@v4
        with:
          name: metrics-labels-ci-evidence
          path: |
            docs/benchmarks/data/metrics-labels-ci.json
            /tmp/metrics-labels-ci.md

      # Issue #35: the late-label-hydration `--profile ci` smoke step —
      # reproducibility + a committed CI-scale evidence artifact only (same
      # posture as #34's M2 step above: no asserted `system.query_log`
      # ratio gate here). `--profile ci` hard-codes the fixed
      # `[1_000, 10_000]` breadth set and rejects any `--breadths`
      # override, so this step never silently runs the 50,000-breadth
      # verdict-evaluation shape in CI (that is `--profile full`,
      # manual-only — see docs/benchmarks/m1-logs-late-hydration.md's
      # reproduction section). Reuses this job's ClickHouse 24.8 container.
      - name: M1 late-hydration benchmark (--profile ci smoke)
        run: |
          cargo run -p xtask -- bench logs-hydration \
            --http-url http://127.0.0.1:19123 --database pulsus_bench_hydration_ci \
            --profile ci --seed 42 \
            --out docs/benchmarks/data/logs-hydration-ci.json \
            --report-out /tmp/logs-hydration-ci.md

      - name: Upload M1 late-hydration evidence
        uses: actions/upload-artifact@v4
        with:
          name: logs-hydration-ci-evidence
          path: |
            docs/benchmarks/data/logs-hydration-ci.json
            /tmp/logs-hydration-ci.md

      # Live API/engine suites — every env-gated suite runs here; new issues
      # must wire theirs in. Each test self-isolates via its own throwaway
      # database (`DROP DATABASE IF EXISTS` + a unique `pulsus_*_it_*` name)
      # or, for live_cityhash/live_intdiv/live_clickhouse, read-only queries
      # against the bare image's pre-created `default` database — none of
      # them touch the `pulsus` database `--mode init` uses below.
      - name: Live ClickHouse client suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-clickhouse --test live_clickhouse

      - name: Live cityHash64 fixture cross-check
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-model --test live_cityhash

      - name: Live intDiv activity-bucket cross-check
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-model --test live_intdiv

      - name: Live metrics cache suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test live_metrics_cache

      - name: Live metrics engine suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test live_metrics_engine

      - name: Rollup differential suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test rollup_differential

      - name: Series stream cap suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test series_stream_cap

      - name: Live metric writer suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-write --test live_metric_writer

      # Spawns the real `pulsusdb` binary against this job's ClickHouse
      # container (fixed loopback ports 31100-31117, distinct from any
      # other port this job uses) to drive it over HTTP end-to-end.
      - name: Live server smoke test (/ready, /metrics, /config, /buildinfo)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-server --test live_server

      # Issue #87: this step and the API-suite steps below run via
      # ci/test-summary.sh (cargo-nextest + JUnit) so their per-suite
      # results land in the run summary and the uploaded artifact —
      # identical test set and gating (the wrapper exits with nextest's
      # own code).
      - name: Live logs API suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run logs_api_live -p pulsus-server --test logs_api_live

      # Issue #32: spawns the real `pulsusdb` binary and drives `/api/v1/*`
      # (discovery incl. matcher-only `match[]`, instant query,
      # `status/tsdb`, malformed-query error shape) over loopback HTTP,
      # same live-suite pattern as the two steps above.
      - name: Live Prometheus API (/api/v1) suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run prom_api_live -p pulsus-server --test prom_api_live

      # Issue #55: spawns the real `pulsusdb` binary and drives the
      # `/api/traces/v1/trace/{traceId}[/json]` fetch surface end-to-end —
      # OTLP ingest seed, JSON/protobuf negotiation (incl. the 406
      # mapping), dedup, short-id resolution, canonical ordering. Port
      # 31130. Reuses this job's ClickHouse 24.8 container.
      - name: Live traces API suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run traces_api_live -p pulsus-server --test traces_api_live

      # Issue #57 AC2/AC6 (Tier-1, scale-invariant): EXPLAIN/query_log
      # gates for the two-phase TraceQL search generators (projection
      # selection, attr-index prefix + time pruning, top-K Limit, the
      # bounded-transfer LIMIT differential) plus the live budget trips
      # (scan-budget 422, Layer-2 retention 422, span-overflow partial).
      # Wired here by issue #58 — the step was omitted when #57 landed.
      # Reuses this job's ClickHouse 24.8 container.
      - name: TraceQL search EXPLAIN + budget gates (Tier 1)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test traces_search_explain

      # Issue #57 AC3/AC5: spawns the real `pulsusdb` binary and drives
      # `GET /api/traces/v1/search` end-to-end — exact trace-ID sets for
      # the pre-committed q= cases, legacy-params equivalence, ordering/
      # tiebreak, cap/partial contract, scan-budget 422. Ports
      # 31131-31133. Wired here by issue #58 — the step was omitted when
      # #57 landed. Reuses this job's ClickHouse 24.8 container.
      - name: Live traces search suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run traces_search_live -p pulsus-server --test traces_search_live

      # Issue #58 AC9 (Tier-1, scale-invariant): the tag-discovery index
      # gates on the exact tags_sql shapes — strict (scope)/(scope, key)
      # primary-key-prefix pruning for the scoped shapes (two-shape
      # query_log comparison), the two unscoped degraded paths recorded.
      # Reuses this job's ClickHouse 24.8 container.
      - name: Tag catalog EXPLAIN gate (Tier 1)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test traces_tags_explain

      # Issue #58 AC8: spawns the real `pulsusdb` binary and drives the
      # §4.3 tags/tag-values surface end-to-end — deduped scoped names,
      # typed value inference, q= superset semantics, the truncation
      # contract, and the zero-payload query_log proof (catalog-only
      # reads). Port 31134. Reuses this job's ClickHouse 24.8 container.
      - name: Live traces tags suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run traces_tags_live -p pulsus-server --test traces_tags_live

      # Issue #59 AC3 (Tier 1, scale-invariant): EXPLAIN/query_log gates
      # on the real TraceQL metrics pushdown — service PREWHERE hoist ->
      # service_time projection, attr semi-join (key, val)-prefix + time
      # granule pruning, the scan-budget 422 trip, and the semi-join
      # IN-set overflow (code 191 -> the dedicated 422 reason). Reuses
      # this job's ClickHouse 24.8 container.
      - name: TraceQL metrics EXPLAIN + budget gates (Tier 1)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test traces_metrics_explain

      # Issue #59 AC4 (Tier 1): the metrics internal-consistency
      # identities on a seeded deterministic corpus — sum(rate*step) ==
      # sum(count_over_time) == independent deduped count, instant ==
      # whole-snapped-window bucket, replay-duplicate invariance, snap
      # edge cases, dual-scope negation. Reuses this job's ClickHouse
      # 24.8 container.
      - name: Live traces metrics consistency suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run traces_metrics_live -p pulsus-read --test traces_metrics_live

      # Issue #36: the live exhaustive API conformance matrix — every
      # mounted route x case-class over loopback HTTP against five
      # `pulsusdb` spawns (mode/auth/compat permutations), reusing this
      # job's ClickHouse 24.8 container. The hermetic drift-guard/docs-gap
      # half (`route_inventory`) needs no step here — it runs under the
      # `ci` job's plain `cargo test --workspace` above.
      - name: API conformance matrix
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: ci/test-summary.sh run api_conformance -p pulsus-server --test api_conformance

      - name: Build pulsusdb
        run: cargo build -p pulsus-server --bin pulsusdb

      - name: "--mode init: first run creates every table/MV"
        env:
          CLICKHOUSE_SERVER: localhost
          CLICKHOUSE_HTTP_PORT: "19123"
          CLICKHOUSE_DB: pulsus
        run: ./target/debug/pulsusdb --mode init

      - name: "--mode init: second run is a no-op (acceptance criterion)"
        env:
          CLICKHOUSE_SERVER: localhost
          CLICKHOUSE_HTTP_PORT: "19123"
          CLICKHOUSE_DB: pulsus
        run: ./target/debug/pulsusdb --mode init

      - name: Stop ClickHouse 24.8
        if: always()
        run: docker rm -f pulsus-ch-schema-it

      - name: Start ClickHouse 24.3 (below the minimum supported version)
        run: |
          docker run -d --name pulsus-ch-schema-it-old -p 19124:8123 -p 19001:9000 \
            -v "$GITHUB_WORKSPACE"/ci/clickhouse-cluster/users.d/network.xml:/etc/clickhouse-server/users.d/zz-network.xml:ro \
            clickhouse/clickhouse-server:24.3
          for _ in $(seq 1 30); do
            curl -sf http://localhost:19124/ping && break
            sleep 1
          done

      - name: "--mode init refuses ClickHouse < 24.8 with a clear error"
        env:
          CLICKHOUSE_SERVER: localhost
          CLICKHOUSE_HTTP_PORT: "19124"
          CLICKHOUSE_DB: pulsus
        run: |
          set +e
          output=$(./target/debug/pulsusdb --mode init 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            echo "::error::expected a nonzero exit refusing ClickHouse < 24.8, got 0"
            exit 1
          fi
          if ! echo "$output" | grep -qi "24.8"; then
            echo "::error::refusal message did not name the minimum supported version (24.8)"
            exit 1
          fi

      - name: Stop ClickHouse 24.3
        if: always()
        run: docker rm -f pulsus-ch-schema-it-old

      # Issue #87: per-suite results table (plus the api_conformance
      # matrix dimensions) on every run, pass or fail. The summarizer
      # never fails a green run — generation problems are warnings only.
      - name: Write test results summary
        if: always()
        run: ci/test-summary.sh render

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-schema-it
          path: target/test-summary/
          if-no-files-found: ignore

  # Issue #5: the 2-shard + Keeper cluster variant — Replicated engines,
  # `_dist` write/read-back, and the live sharding-identity assertion
  # (docs/schemas.md §7). Fixture at ci/clickhouse-cluster/compose.yaml.
  schema-it-cluster:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Start the 2-shard cluster
        run: docker compose -f ci/clickhouse-cluster/compose.yaml up -d

      - name: Wait for cluster health
        run: |
          for _ in $(seq 1 60); do
            h1=$(docker inspect -f '{{.State.Health.Status}}' pulsus-ch-shard1-it 2>/dev/null || echo starting)
            h2=$(docker inspect -f '{{.State.Health.Status}}' pulsus-ch-shard2-it 2>/dev/null || echo starting)
            hk=$(docker inspect -f '{{.State.Health.Status}}' pulsus-keeper-it 2>/dev/null || echo starting)
            if [ "$h1" = healthy ] && [ "$h2" = healthy ] && [ "$hk" = healthy ]; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::cluster did not become healthy in time"
          docker ps -a
          exit 1

      - name: Live cluster tests (_dist write/read-back, sharding identity)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
        run: cargo test -p pulsus-schema --test live_cluster

      # Issue #57 AC4: per-stage per-shard shard-locality verdicts for the
      # two-phase TraceQL search + trace-by-ID, against a client-computed
      # cityHash64(trace_id) % total_weight roster (hard errors on any
      # fan-out violation). Recorded evidence: docs/benchmarks/
      # m4-traces-read-path.md + data/traces-read-cluster-ci.json.
      - name: Traces read-path fan-out evidence (bench traces-read)
        run: |
          cargo run -p xtask -- bench traces-read \
            --http-url http://127.0.0.1:18123 \
            --database pulsus_traces_bench_ci \
            --cluster pulsus_test_cluster

      - name: Tear down the cluster
        if: always()
        run: docker compose -f ci/clickhouse-cluster/compose.yaml down -v

  # Issue #7: e2e harness skeleton. Both legs build the local `pulsusdb:e2e`
  # image once via buildx (GHA layer cache, so the image build itself is
  # fast on both legs) then hand the whole stack lifecycle — up, poll
  # `/ready`, run scenarios, down — to `pulsus-e2e`, the same binary local
  # development runs against Podman. Since issue #33, this also gates the
  # M2 differential-accuracy scenario at its `ci` (~1k series) tier
  # (`PULSUS_E2E_METRICS_SCALE` defaults to `ci` — `e2e/src/metrics.rs`);
  # the ~10k `full` tier is `e2e-metrics-full` below.
  e2e-single:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v4

      - name: Build pulsusdb:e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: pulsusdb:e2e
          load: true
          cache-from: type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-e2e

      - name: Run the single-node e2e harness
        run: cargo run -p pulsus-e2e -- --variant single --engine docker

      # Issue #33: the metrics-differential scenario dumps a minimal repro
      # (query, mode, window, both raw responses) to
      # `target/e2e-artifacts/metrics-diff/<variant>/` on any mismatch —
      # never an allowlist (docs/features.md §7 AC). Uploaded only on
      # failure so a green run carries no extra CI artifact weight.
      - name: Upload metrics-differential mismatch artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-single-metrics-diff-artifacts
          path: target/e2e-artifacts/**
          if-no-files-found: ignore

  e2e-cluster:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v4

      - name: Build pulsusdb:e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: pulsusdb:e2e
          load: true
          cache-from: type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-e2e

      - name: Run the 2-shard cluster e2e harness
        run: cargo run -p pulsus-e2e -- --variant cluster --engine docker

      - name: Upload metrics-differential mismatch artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cluster-metrics-diff-artifacts
          path: target/e2e-artifacts/**
          if-no-files-found: ignore

  # Issue #33: the literal docs/features.md §7 "10k series" acceptance
  # criterion — a green run of both variants at the `full` tier is #33's
  # own closure evidence, then continuously re-validated nightly/on
  # dispatch (the `ci` tier above gates every PR; correctness is
  # scale-invariant, so this leg is evidence-gathering, not per-PR
  # protection — same split as issue #16's `bench-cluster`).
  e2e-metrics-full:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: ci
    strategy:
      matrix:
        variant: [single, cluster]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"

      - uses: docker/setup-buildx-action@v4

      - name: Build pulsusdb:e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: pulsusdb:e2e
          load: true
          cache-from: type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-e2e

      - name: Run the ${{ matrix.variant }} e2e harness (full 10k-series differential tier)
        env:
          PULSUS_E2E_METRICS_SCALE: full
          # Issue #60 AC3: the traces scenarios' full tier rides this
          # same nightly/dispatch job (per-PR legs run the `ci` tier
          # default); the single leg exercises the Tempo differential at
          # full scale, the cluster leg the native roundtrip.
          PULSUS_E2E_TRACES_SCALE: full
          # Issue M6-09 plan v2 delta A: the LogQL-pipeline differential
          # (`logs_pipeline_differential`, single variant only) is
          # nightly/dispatch-tier — the scenario self-gates on this flag
          # and prints a skip on per-PR e2e-single runs (no per-PR gate,
          # no new job).
          PULSUS_E2E_LOGS_DIFFERENTIAL: "1"
          PULSUS_E2E_LOGS_SCALE: full
        run: cargo run -p pulsus-e2e -- --variant ${{ matrix.variant }} --engine docker

      - name: Upload metrics-differential evidence/mismatch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-metrics-full-${{ matrix.variant }}-artifacts
          path: target/e2e-artifacts/**
          if-no-files-found: ignore

  # Issue #16, docs/schemas.md §9's two-tier model, Tier 1 distributed leg:
  # captures per-shard system.query_log + EXPLAIN PIPELINE evidence for the
  # logs-family shard-locality claims (docs/schemas.md §7,
  # docs/architecture.md risks table) on the 4-shard fixture
  # (ci/bench-cluster/compose.yaml, extends ci/clickhouse-cluster/'s
  # 2-shard pattern). Manual-dispatch-only (task-manager resolution #4 on
  # issue #16): the scale-invariant gates already run per-PR on single-node
  # (schema-it, above); this leg is evidence-gathering, not per-PR
  # protection — promote to a nightly `schedule` if/when regressions
  # actually appear here.
  bench-cluster:
    if: github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"

      - name: Start the 4-shard bench cluster
        run: docker compose -f ci/bench-cluster/compose.yaml up -d

      - name: Wait for cluster health
        run: |
          for _ in $(seq 1 60); do
            h1=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard1 2>/dev/null || echo starting)
            h2=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard2 2>/dev/null || echo starting)
            h3=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard3 2>/dev/null || echo starting)
            h4=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard4 2>/dev/null || echo starting)
            hk=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-keeper 2>/dev/null || echo starting)
            if [ "$h1" = healthy ] && [ "$h2" = healthy ] && [ "$h3" = healthy ] && [ "$h4" = healthy ] && [ "$hk" = healthy ]; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::cluster did not become healthy in time"
          docker ps -a
          exit 1

      - name: Run the M1 logs read-path benchmark (--dist)
        run: |
          cargo run -p xtask -- bench logs-read --dist \
            --http-url http://127.0.0.1:18123 --database pulsus_bench_dist \
            --cluster pulsus_bench_cluster \
            --profile ci --seed 42 --services 50 --streams 500 \
            --lines-per-sec 200 --duration-secs 3600 --reps 5 \
            --out docs/benchmarks/data/logs-read-dist.json \
            --report-out /tmp/logs-read-dist.md

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: logs-read-dist-evidence
          path: |
            docs/benchmarks/data/logs-read-dist.json
            /tmp/logs-read-dist.md

      - name: Tear down the cluster
        if: always()
        run: docker compose -f ci/bench-cluster/compose.yaml down -v
