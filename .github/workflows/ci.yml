name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Issue #16: lets the manual-dispatch-only `bench-cluster` job (below) be
  # triggered on demand — the scale-invariant gates already run per-PR on
  # single-node (`schema-it`); the 4-shard leg is evidence-gathering, not
  # per-PR protection (task-manager resolution #4 on issue #16).
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # Issue #5: every DDL block in docs/schemas.md must be rendered and
  # executed against a fresh ClickHouse in CI. Single-node 24.8 leg (live
  # migration/MV tests, the `--mode init` create-then-no-op acceptance
  # criterion) plus a negative leg proving the < 24.8 version refusal.
  # Uses the runner's own docker (task-manager resolution #3 on issue #5);
  # local development uses podman against the same runtime-neutral fixtures.
  schema-it:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Start ClickHouse 24.8
        run: |
          docker run -d --name pulsus-ch-schema-it -p 19123:8123 -p 19000:9000 \
            -v $GITHUB_WORKSPACE/ci/clickhouse-cluster/users.d/network.xml:/etc/clickhouse-server/users.d/zz-network.xml:ro \
            clickhouse/clickhouse-server:24.8
          for i in $(seq 1 30); do
            curl -sf http://localhost:19123/ping && break
            sleep 1
          done

      - name: Live schema tests (single-node, migrations + MVs + crash/retry)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-schema --test live_schema

      # Issue #11: docs/schemas.md §9's "EXPLAIN indexes = 1 output for the
      # canonical queries is snapshot-tested" gate for the LogQL read path —
      # reuses this job's ClickHouse 24.8 container verbatim.
      - name: LogQL EXPLAIN indexes gate
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test explain_indexes

      # Issue #16, docs/schemas.md §9's two-tier model, Tier 1: the
      # scale-invariant system.query_log ratio gate for the logs read path
      # (CI-scale corpus). Reuses this job's ClickHouse 24.8 container.
      - name: LogQL query_log ratio gate (Tier 1)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test query_log_gates

      # Issue #16 plan amendment: licenses the direct RowBinary bulk-load
      # shortcut `xtask bench logs-read`'s dataset generator uses for the
      # CI-scale/Tier-2 corpora, by proving it is byte-identical to the
      # product OTLP ingest path against hand-derived golden fixtures.
      - name: Ingest fidelity gate (product ingest vs. bulk RowBinary)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-write --test ingest_fidelity

      # Live API/engine suites — every env-gated suite runs here; new issues
      # must wire theirs in. Each test self-isolates via its own throwaway
      # database (`DROP DATABASE IF EXISTS` + a unique `pulsus_*_it_*` name)
      # or, for live_cityhash/live_intdiv/live_clickhouse, read-only queries
      # against the bare image's pre-created `default` database — none of
      # them touch the `pulsus` database `--mode init` uses below.
      - name: Live ClickHouse client suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-clickhouse --test live_clickhouse

      - name: Live cityHash64 fixture cross-check
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-model --test live_cityhash

      - name: Live intDiv activity-bucket cross-check
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-model --test live_intdiv

      - name: Live metrics cache suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test live_metrics_cache

      - name: Live metrics engine suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test live_metrics_engine

      - name: Rollup differential suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test rollup_differential

      - name: Series stream cap suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-read --test series_stream_cap

      - name: Live metric writer suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-write --test live_metric_writer

      # Spawns the real `pulsusdb` binary against this job's ClickHouse
      # container (fixed loopback ports 31100-31117, distinct from any
      # other port this job uses) to drive it over HTTP end-to-end.
      - name: Live server smoke test (/ready, /metrics, /config, /buildinfo)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-server --test live_server

      - name: Live logs API suite
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
          PULSUS_TEST_CH_HTTP_PORT: "19123"
        run: cargo test -p pulsus-server --test logs_api_live

      - name: Build pulsusdb
        run: cargo build -p pulsus-server --bin pulsusdb

      - name: "--mode init: first run creates every table/MV"
        env:
          CLICKHOUSE_SERVER: localhost
          CLICKHOUSE_HTTP_PORT: "19123"
          CLICKHOUSE_DB: pulsus
        run: ./target/debug/pulsusdb --mode init

      - name: "--mode init: second run is a no-op (acceptance criterion)"
        env:
          CLICKHOUSE_SERVER: localhost
          CLICKHOUSE_HTTP_PORT: "19123"
          CLICKHOUSE_DB: pulsus
        run: ./target/debug/pulsusdb --mode init

      - name: Stop ClickHouse 24.8
        if: always()
        run: docker rm -f pulsus-ch-schema-it

      - name: Start ClickHouse 24.3 (below the minimum supported version)
        run: |
          docker run -d --name pulsus-ch-schema-it-old -p 19124:8123 -p 19001:9000 \
            -v $GITHUB_WORKSPACE/ci/clickhouse-cluster/users.d/network.xml:/etc/clickhouse-server/users.d/zz-network.xml:ro \
            clickhouse/clickhouse-server:24.3
          for i in $(seq 1 30); do
            curl -sf http://localhost:19124/ping && break
            sleep 1
          done

      - name: "--mode init refuses ClickHouse < 24.8 with a clear error"
        env:
          CLICKHOUSE_SERVER: localhost
          CLICKHOUSE_HTTP_PORT: "19124"
          CLICKHOUSE_DB: pulsus
        run: |
          set +e
          output=$(./target/debug/pulsusdb --mode init 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            echo "::error::expected a nonzero exit refusing ClickHouse < 24.8, got 0"
            exit 1
          fi
          if ! echo "$output" | grep -qi "24.8"; then
            echo "::error::refusal message did not name the minimum supported version (24.8)"
            exit 1
          fi

      - name: Stop ClickHouse 24.3
        if: always()
        run: docker rm -f pulsus-ch-schema-it-old

  # Issue #5: the 2-shard + Keeper cluster variant — Replicated engines,
  # `_dist` write/read-back, and the live sharding-identity assertion
  # (docs/schemas.md §7). Fixture at ci/clickhouse-cluster/compose.yaml.
  schema-it-cluster:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Start the 2-shard cluster
        run: docker compose -f ci/clickhouse-cluster/compose.yaml up -d

      - name: Wait for cluster health
        run: |
          for i in $(seq 1 60); do
            h1=$(docker inspect -f '{{.State.Health.Status}}' pulsus-ch-shard1-it 2>/dev/null || echo starting)
            h2=$(docker inspect -f '{{.State.Health.Status}}' pulsus-ch-shard2-it 2>/dev/null || echo starting)
            hk=$(docker inspect -f '{{.State.Health.Status}}' pulsus-keeper-it 2>/dev/null || echo starting)
            if [ "$h1" = healthy ] && [ "$h2" = healthy ] && [ "$hk" = healthy ]; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::cluster did not become healthy in time"
          docker ps -a
          exit 1

      - name: Live cluster tests (_dist write/read-back, sharding identity)
        env:
          PULSUS_TEST_CLICKHOUSE: "1"
        run: cargo test -p pulsus-schema --test live_cluster

      - name: Tear down the cluster
        if: always()
        run: docker compose -f ci/clickhouse-cluster/compose.yaml down -v

  # Issue #7: e2e harness skeleton. Both legs build the local `pulsusdb:e2e`
  # image once via buildx (GHA layer cache, so the image build itself is
  # fast on both legs) then hand the whole stack lifecycle — up, poll
  # `/ready`, run scenarios, down — to `pulsus-e2e`, the same binary local
  # development runs against Podman.
  e2e-single:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v4

      - name: Build pulsusdb:e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: pulsusdb:e2e
          load: true
          cache-from: type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-e2e

      - name: Run the single-node e2e harness
        run: cargo run -p pulsus-e2e -- --variant single --engine docker

  e2e-cluster:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v4

      - name: Build pulsusdb:e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: pulsusdb:e2e
          load: true
          cache-from: type=gha,scope=pulsusdb-e2e
          cache-to: type=gha,mode=max,scope=pulsusdb-e2e

      - name: Run the 2-shard cluster e2e harness
        run: cargo run -p pulsus-e2e -- --variant cluster --engine docker

  # Issue #16, docs/schemas.md §9's two-tier model, Tier 1 distributed leg:
  # captures per-shard system.query_log + EXPLAIN PIPELINE evidence for the
  # logs-family shard-locality claims (docs/schemas.md §7,
  # docs/architecture.md risks table) on the 4-shard fixture
  # (ci/bench-cluster/compose.yaml, extends ci/clickhouse-cluster/'s
  # 2-shard pattern). Manual-dispatch-only (task-manager resolution #4 on
  # issue #16): the scale-invariant gates already run per-PR on single-node
  # (schema-it, above); this leg is evidence-gathering, not per-PR
  # protection — promote to a nightly `schedule` if/when regressions
  # actually appear here.
  bench-cluster:
    if: github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workspace"

      - name: Start the 4-shard bench cluster
        run: docker compose -f ci/bench-cluster/compose.yaml up -d

      - name: Wait for cluster health
        run: |
          for i in $(seq 1 60); do
            h1=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard1 2>/dev/null || echo starting)
            h2=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard2 2>/dev/null || echo starting)
            h3=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard3 2>/dev/null || echo starting)
            h4=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-shard4 2>/dev/null || echo starting)
            hk=$(docker inspect -f '{{.State.Health.Status}}' pulsus-bench-keeper 2>/dev/null || echo starting)
            if [ "$h1" = healthy ] && [ "$h2" = healthy ] && [ "$h3" = healthy ] && [ "$h4" = healthy ] && [ "$hk" = healthy ]; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::cluster did not become healthy in time"
          docker ps -a
          exit 1

      - name: Run the M1 logs read-path benchmark (--dist)
        run: |
          cargo run -p xtask -- bench logs-read --dist \
            --http-url http://127.0.0.1:18123 --database pulsus_bench_dist \
            --cluster pulsus_bench_cluster \
            --profile ci --seed 42 --services 50 --streams 500 \
            --lines-per-sec 200 --duration-secs 3600 --reps 5 \
            --out docs/benchmarks/data/logs-read-dist.json \
            --report-out /tmp/logs-read-dist.md

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: logs-read-dist-evidence
          path: |
            docs/benchmarks/data/logs-read-dist.json
            /tmp/logs-read-dist.md

      - name: Tear down the cluster
        if: always()
        run: docker compose -f ci/bench-cluster/compose.yaml down -v
