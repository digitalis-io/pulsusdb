[package]
name = "pulsus-server"
version = "0.0.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "pulsusdb"
path = "src/main.rs"

[dependencies]
clap.workspace = true
pulsus-clickhouse = { path = "../pulsus-clickhouse" }
pulsus-config = { path = "../pulsus-config" }
pulsus-schema = { path = "../pulsus-schema" }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
